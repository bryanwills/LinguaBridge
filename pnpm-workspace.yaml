packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
  verifyDepsBeforeRun: false

onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

# Security: Dependabot alert — PostCSS XSS in stringify output (< 8.5.10)
overrides:
  postcss: ">=8.5.10"
