# Production compose for the VPS.
# Usage (from the repo root on the VPS):
#   cp infra/docker/env.web.example infra/docker/.env.web   # then fill it in
#   docker compose -f infra/docker/docker-compose.prod.yml up -d --build
#
# Nginx Proxy Manager reaches this container over the shared "proxy" docker
# network (forward hostname: linguabridge-web, port 3000). Create the network
# once with `docker network create proxy` and attach your NPM container to it.

services:
  web:
    container_name: linguabridge-web
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-}
    env_file:
      - .env.web
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  proxy:
    external: true
